name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3']
    steps:
      - uses: actions/checkout@v5
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: none
      - name: Validate composer.json
        run: composer validate --strict --no-check-publish
      - name: Install deps
        run: composer install --no-interaction --prefer-dist
      - run: composer run lint
      - run: composer run analyse
      - run: composer run test

  no-http-client:
    name: No HTTP client installed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
      - name: Install without any concrete PSR-18 client
        run: composer install --no-interaction --prefer-dist --no-dev
      - name: Smoke-check actionable error surfaces
        run: |
          php -r '
            require "vendor/autoload.php";
            try {
                new Blueticks\Blueticks(["apiKey" => "bt_x"]);
                fwrite(STDERR, "expected failure but client constructed\n");
                exit(1);
            } catch (\Throwable $e) {
                $msg = $e->getMessage();
                echo "error: $msg\n";
                if (stripos($msg, "client") === false && stripos($msg, "psr") === false) {
                    fwrite(STDERR, "failure message not actionable: $msg\n");
                    exit(1);
                }
            }
          '
