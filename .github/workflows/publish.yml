name: Publish to Packagist

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: packagist
      url: https://packagist.org/packages/blueticks/blueticks
    steps:
      - uses: actions/checkout@v5
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
      - run: composer install --no-interaction --prefer-dist
      - run: composer run lint
      - run: composer run analyse
      - run: composer run test
      - name: Ping Packagist (webhook is primary; this is redundancy)
        if: env.PACKAGIST_API_TOKEN != ''
        env:
          PACKAGIST_API_TOKEN: ${{ secrets.PACKAGIST_API_TOKEN }}
          PACKAGIST_USERNAME:  ${{ secrets.PACKAGIST_USERNAME }}
        run: |
          curl -sfSX POST \
            "https://packagist.org/api/update-package?username=${PACKAGIST_USERNAME}&apiToken=${PACKAGIST_API_TOKEN}" \
            -H 'Content-Type: application/json' \
            -d '{"repository":{"url":"https://github.com/serenix-com/blueticks-php"}}'
